name: CI - SonarQube + Unit Tests

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - dev

jobs:
  # ── Light Job: only compile and tests (run in PRs to dev) ──
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  # ── Full Job: SonarQube + Tests (run in push to test) ────
  build-and-analyze:
    name: Build, Test & SonarQube Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # 1️⃣ Code checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configure Java (required for the Sonar scanner)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Configure .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 4️⃣ Install SonarScanner to .NET
      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      # 5️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 6️⃣ Start analysis of SonarQube (Before from build)
      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.projectBaseDir="${{ github.workspace }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**"

      # 7️⃣ Build from project
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 8️⃣ Run unit tests with coverage
      - name: Run Unit Tests
        run: |
          dotnet test --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # 9️⃣ Finalize and send analysis to SonarQube
      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # 🔟 (Optional) Publish test results in GitHub
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage