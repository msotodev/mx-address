name: CI - SonarQube + Unit Tests

# ✅ It's only executed when there's a merge (push) to the "test" branch
on:
  push:
    branches:
      - test

jobs:
  build-and-analyze:
    name: Build, Test & SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Code checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessary to SonarQube (history analysis)

      # 2️⃣ Configure Java (required for the Sonar scanner)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Configure .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'  # It changes depending your version

      # 4️⃣ Install SonarScanner to .NET
      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      # 5️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 6️⃣ Start analysis of SonarQube (Before from build)
      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**"

      # 7️⃣ Build from project
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 8️⃣ Run unit tests with coverage
      - name: Run Unit Tests
        run: |
          dotnet test --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # 9️⃣ Finalize and send analysis to SonarQube
      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # 🔟 (Optional) Publish test results in GitHub
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # Go up even if the test fail
        with:
          name: test-results
          path: ./coverage